name: Deploy Portfolio

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy to Server
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          script: |
            set -euo pipefail

            REPO_DIR="/home/${{ secrets.DEPLOY_USER }}/src/portfolio"
            COMPOSE_DIR="/opt/infrastructure/compose/landingpage"
            SOURCES_DIR="/opt/infrastructure/sources/portfolio"

            echo "=== [1/4] Pulling latest code ==="
            cd "$REPO_DIR"
            git fetch origin main
            git reset --hard origin/main

            echo "=== [2/4] Syncing to sources dir ==="
            rsync -a --delete \
              --exclude='.git' \
              --exclude='node_modules' \
              --exclude='.next' \
              "$REPO_DIR/" "$SOURCES_DIR/"

            echo "=== [3/4] Rebuilding Docker image ==="
            cd "$COMPOSE_DIR"
            docker compose build --no-cache web 2>&1 | tail -10

            echo "=== [4/4] Restarting container ==="
            docker compose up -d --force-recreate
            sleep 5

            echo "=== Health check ==="
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' landingpage 2>/dev/null || echo "no-healthcheck")
            echo "Container status: $STATUS"
            docker ps --filter name=landingpage --format "table {{.Names}}\t{{.Status}}"

            echo "✅ Portfolio deployment complete"
