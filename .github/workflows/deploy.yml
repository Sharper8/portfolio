name: Deploy Portfolio

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy to Server
    # Runs on the self-hosted runner installed on the ThinkPad homelab server.
    # The runner has direct access to docker and /opt/infrastructure.
    runs-on: [self-hosted, homelab]
    timeout-minutes: 15

    steps:
      - name: Pull latest code
        run: |
          set -euo pipefail
          REPO_DIR="/home/user_ubuntu_serv/src/portfolio"
          cd "$REPO_DIR"
          git fetch origin main
          git reset --hard origin/main
          echo "✓ Now at: $(git log --oneline -1)"

      - name: Sync to Docker build context
        run: |
          set -euo pipefail
          rsync -a --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            /home/user_ubuntu_serv/src/portfolio/ \
            /opt/infrastructure/sources/portfolio/
          echo "✓ Sources synced"

      - name: Build Docker image
        run: |
          set -euo pipefail
          cd /opt/infrastructure/compose/landingpage
          docker compose build --no-cache web
          echo "✓ Image built"

      - name: Restart container
        run: |
          set -euo pipefail
          cd /opt/infrastructure/compose/landingpage
          docker compose up -d --force-recreate
          echo "✓ Container restarted"

      - name: Health check
        run: |
          sleep 10
          STATUS=$(docker inspect --format='{{.State.Health.Status}}' landingpage 2>/dev/null || echo "no-healthcheck")
          echo "Health: $STATUS"
          docker ps --filter name=landingpage --format "table {{.Names}}\t{{.Status}}"
          echo "✅ Portfolio deployment complete"
